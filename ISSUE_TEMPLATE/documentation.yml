name: Documentation
description: 문서의 오류, 누락 또는 개선 사항을 제안합니다.
title: "[Docs] "
body:
  - type: input
    id: location
    attributes:
      label: 문서 위치
      description: 관련 URL, 파일 경로 또는 문서 이름을 작성해주세요.
      placeholder: docs/... 또는 https://...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 문제
      description: 무엇이 잘못되었거나 이해하기 어려운지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 제안
      description: 가능한 개선 방향이 있다면 작성해주세요.
    validations:
      required: false
