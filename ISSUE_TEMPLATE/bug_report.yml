name: Bug report
description: 재현 가능한 문제를 보고합니다.
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        제보해주셔서 감사합니다.
        보안 취약점은 이 양식을 사용하지 말고 `SECURITY.md`를 따라 비공개로 보고해주세요.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: 동일하거나 유사한 Issue가 없는지 검색했습니다.
          required: true
        - label: 이 문제는 Security Vulnerability가 아닙니다.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 현재 발생하는 문제를 간결하게 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      description: 정상이라면 어떤 동작을 기대했는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 가능한 한 최소한의 재현 절차를 작성해주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: Version, OS, Runtime, Browser 등 문제와 관련된 환경 정보를 작성해주세요.
      placeholder: |
        - Version / Commit:
        - OS:
        - Runtime:
        - Browser:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: 관련 Log가 있다면 민감정보를 제거한 뒤 붙여넣어주세요.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 추가 정보
      description: Screenshot, 관련 링크, 추정 원인 등 추가 맥락을 작성해주세요.
    validations:
      required: false
