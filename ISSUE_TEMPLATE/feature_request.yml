name: Feature request
description: 새로운 기능 또는 개선을 제안합니다.
title: "[Feature] "
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: 동일하거나 유사한 제안이 없는지 검색했습니다.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 기능 자체보다 먼저, 어떤 사용자 또는 운영 문제를 해결하려는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: 원하는 동작이나 접근 방법을 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 현재 가능한 대안이나 고려한 다른 접근 방법이 있다면 작성해주세요.
    validations:
      required: false

  - type: textarea
    id: value
    attributes:
      label: 기대 효과
      description: 누가 어떤 가치를 얻는지 설명해주세요.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 영향 범위
      options:
        - 사용자 경험
        - Developer Experience
        - API / SDK
        - Infrastructure / Operations
        - Security / Privacy
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 추가 정보
      description: Mockup, Reference, 관련 Issue 등 추가 맥락을 작성해주세요.
    validations:
      required: false
